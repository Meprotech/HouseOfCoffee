<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="data:,">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>AR Scanner - HOUSE OF COFFEE</title>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
        <style>
            .arjs-loader {
                height: 100%; width: 100%; position: absolute; top: 0; left: 0;
                background-color: rgba(0, 0, 0, 0.9); z-index: 9999;
                display: flex; justify-content: center; align-items: center;
                color: white; font-family: 'Inter', sans-serif;
                text-align: center; padding: 20px;
            }
            .back-btn {
                position: fixed; top: 20px; left: 20px; z-index: 10000;
                padding: 12px 24px; background: rgba(0,0,0,0.7); color: white;
                border: 2px solid #FF4757; border-radius: 30px; cursor: pointer;
                font-weight: bold; backdrop-filter: blur(10px);
                text-transform: uppercase; letter-spacing: 1px;
            }
            .scan-overlay {
                position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
                z-index: 10000; color: white; background: rgba(255, 71, 87, 0.8);
                padding: 10px 20px; border-radius: 20px; font-weight: bold;
                pointer-events: none; white-space: nowrap;
            }
            #example-scanning-overlay {
                display: flex; align-items: center; justify-content: center;
                position: absolute; left: 0; right: 0; top: 0; bottom: 0;
                background: transparent; z-index: 9995;
            }
            @media (min-aspect-ratio: 1/1) {
                #example-scanning-overlay .inner { width: 50vh; height: 50vh; }
            }
            @media (max-aspect-ratio: 1/1) {
                #example-scanning-overlay .inner { width: 80vw; height: 80vw; }
            }
            #example-scanning-overlay .inner {
                display: flex; flex-direction: column; align-items: center;
                justify-content: center; background: rgba(0,0,0,0.2);
                border: 3px solid #FF4757; border-radius: 20px;
            }
        </style>
    </head>
    <body style="margin : 0px; overflow: hidden;">
        <div id="example-scanning-overlay" class="hidden">
            <div class="inner">
                <div class="scanline"></div>
            </div>
        </div>

        <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
        <div class="scan-overlay">Scan the Coffee Card</div>

        <a-scene 
            mindar-image="imageTargetSrc: assets/targets.mind; autoStart: true; uiScanning: #example-scanning-overlay;" 
            color-space="sRGB" 
            renderer="colorManagement: true, physicallyCorrectLights" 
            vr-mode-ui="enabled: false" 
            device-orientation-permission-ui="enabled: false">
            
            <a-assets>
                <a-asset-item id="coffee-model" src="assets/model.glb"></a-asset-item>
            </a-assets>

            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

            <a-entity mindar-image-target="targetIndex: 0">
                <a-entity 
                    gltf-model="#coffee-model" 
                    scale="1 1 1" 
                    position="0 0 0"
                    rotation="0 0 0"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
                </a-entity>
                <a-text  position="0 0.8 0" align="center" color="#FF4757" width="2"></a-text>
            </a-entity>

            <!-- Lighting -->
            <a-entity light="type: ambient; intensity: 1.5"></a-entity>
            <a-entity light="type: directional; intensity: 1" position="-1 1 1"></a-entity>
        </a-scene>
    </body>
</html>
